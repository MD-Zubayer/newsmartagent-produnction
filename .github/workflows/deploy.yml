name: "🚀 Blue-Green Docker Deploy"

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: "Deploy with Zero Downtime"
    runs-on: self-hosted

    steps:
      - name: "🔓 Fix Permissions for Cleanup"
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }} || true
          sudo chmod -R 777 ${{ github.workspace }} || true
      - name: "📂 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🏗️ Build New Image"
        run: |
          echo "🔨 Building new images..."
          # নতুন কোড অনুযায়ী ইমেজ বিল্ড করবে
          docker compose build --pull
          
      - name: "🚢 Zero Downtime Deployment & Rollback"
        run: |
          # এনভায়রনমেন্ট ও ফাইল সেটআপ
          cp ~/newsmartagent.env .env || echo ".env file already in place"

          mkdir -p /home/ubuntu/configs
          # যদি ফাইলটি অলরেডি থাকে তবে ওভাররাইট করবে
          cp ~/service_account.json /home/ubuntu/service_account.json || echo "Service account already exists"

          echo "🔄 Deploying with Zero Downtime..."
          
          # ১. নতুন ইমেজ পুল করা
          docker compose pull
          
          # ২. নতুন কন্টেইনার চালু করা (পুরানোটা চালু রেখেই হেলথ চেক করবে)
          if ! docker compose up -d --build --remove-orphans; then
            echo "🚨 Deployment failed! Attempting to keep old services alive..."
            exit 1
          fi

          # ৩. হেলথ চেক: ভেরিয়েবল লোড করা এবং ১৫ সেকেন্ড অপেক্ষা করা
          PROJECT_NAME=$(grep '^PROJECT_NAME=' .env | head -n 1 | cut -d '=' -f2)
          echo "⏳ Waiting for services to stabilize for project: ${PROJECT_NAME}..."
          sleep 15
          
          # চেক করা হচ্ছে মেইন সার্ভিস (Django) রানিং কি না (grep safety added)
          if ! docker ps | grep -q -- "${PROJECT_NAME}-django"; then
            echo "❌ New version is not stable! Rolling back..."
            # রোলব্যাক লজিক: এখানে প্রয়োজনে আগের ইমেজ দিয়ে রিকভারি কমান্ড দেওয়া যায়
            exit 1
          else
            echo "🚀 NewSmartAgent is live and stable!"
          fi

      - name: "🌡️ Critical Health Verification"
        run: |
          echo "Verifying NSA system integrity..."
          # কন্টেইনারগুলো স্থির হতে সামান্য সময় দিন
          sleep 5

          # Backend health JSON টেনে এনে status/DB/Redis চেক
          HEALTH_JSON=$(curl -s --max-time 10 http://localhost/api/health/)
          if [ -z "$HEALTH_JSON" ]; then
            echo "🚨 Backend health endpoint did not respond"; exit 1
          fi

          read STATUS DB_STATUS REDIS_STATUS <<EOF
$(python - <<'PY'
import json,sys
try:
    data=json.loads(open(0).read())
    print(data.get("status",""), data.get("checks",{}).get("database",""), data.get("checks",{}).get("redis",""))
except Exception as e:
    print("", "", "")
PY
)
EOF

          if [ "$STATUS" = "ok" ] && [ "$DB_STATUS" = "ok" ] && [ "$REDIS_STATUS" = "ok" ]; then
            echo "✅ Backend healthy (app, DB, Redis)"
          else
            echo "🚨 Backend degraded! status=$STATUS db=$DB_STATUS redis=$REDIS_STATUS"
            exit 1
          fi

          # Frontend simple probe
          curl -f --max-time 10 http://localhost/frontend-health || (echo "🚨 Frontend health failed" && exit 1)

      - name: "🧹 Post-Deployment Cleanup"
        if: always()
        run: |
          docker image prune -f
          echo "✨ Cleanup finished."
