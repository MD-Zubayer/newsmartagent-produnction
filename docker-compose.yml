x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: ${PROJECT_NAME}-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: postgres -c shared_buffers=4GB -c effective_cache_size=10GB -c work_mem=64MB -c maintenance_work_mem=1GB
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      update_config:
        order: start-first
    networks:
      - smart-network
      
  redis:
    image: redis/redis-stack-server:latest
    container_name: ${PROJECT_NAME}-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      update_config:
        order: start-first
    networks:
      smart-network:
        aliases:
          - ${PROJECT_NAME}-redis
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --loadmodule /opt/redis-stack/lib/redisearch.so
      --loadmodule /opt/redis-stack/lib/rejson.so
      --maxmemory 6gb
      --maxmemory-policy allkeys-lru
      --protected-mode no
      --appendonly yes
      --appendfsync everysec
      --save 60 1000

  backend:
    build: ./jwtauth
    container_name: ${PROJECT_NAME}-django
    command: gunicorn jwtauth.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 5 --threads 4 --timeout 120
    volumes:
      - ./jwtauth:/app
      - static_volume:/app/static
      - media_volume:/app/media
      - ${HOST_CONFIG_PATH}/service_account.json:/app/gdrive_key.json:ro
    
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}     
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL}
      - FB_APP_ID=${FB_APP_ID}
      - FB_APP_SECRET=${FB_APP_SECRET}
      - FB_REDIRECT_URI=${FB_REDIRECT_URI}
      - GOOGLE_DRIVE_LOG_FOLDER_ID=${GOOGLE_DRIVE_LOG_FOLDER_ID}
      - GOOGLE_DRIVE_LOG_SUBFOLDER=${GOOGLE_DRIVE_LOG_SUBFOLDER}
      - GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE=/app/gdrive_key.json
      - BAILEYS_API_URL=${BAILEYS_API_URL}
      - BAILEYS_API_SECRET=${BAILEYS_API_SECRET}
    depends_on:
      - db
      - redis
    logging: *default-logging
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect((\"localhost\", 8000))' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          memory: 4G
    networks:
      - smart-network


  frontend:
    build: ./nextjs
    container_name: ${PROJECT_NAME}-nextjs
    environment:
      - NEXT_PUBLIC_BASE_URL=https://${MAIN_DOMAIN}
      - NEXT_PUBLIC_API_URL=https://${MAIN_DOMAIN}/api
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.get('http://127.0.0.1:3000/frontend-health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }); req.on('error', () => process.exit(1));\""]
      interval: 15s
      timeout: 10s
      retries: 3
    logging: *default-logging
    depends_on:
      - backend
    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          memory: 4G
    
    networks:
      - smart-network

  nginx:
    build: ./nginx
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - MAIN_DOMAIN=${MAIN_DOMAIN}
      - N8N_DOMAIN=${N8N_DOMAIN}
      - MINIO_CONSOLE_DOMAIN=${MINIO_CONSOLE_DOMAIN}
      - MINIO_API_DOMAIN=${MINIO_API_DOMAIN}
    depends_on:
       - backend
       - frontend
    deploy:
      update_config:
        order: start-first
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    logging: *default-logging
    hostname: newsmartagent-nginx
    networks:
      - smart-network


  celery_worker:
    build: ./jwtauth
    container_name: ${PROJECT_NAME}-celery-worker
    command: celery -A jwtauth worker -Q chat_queue,celery -c 8 --prefetch-multiplier 1 --max-tasks-per-child 1000 --loglevel=info
    volumes:
      - ./jwtauth:/app
      - ${HOST_CONFIG_PATH}/service_account.json:/app/gdrive_key.json:ro
    env_file:
      - .env
    
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
      - GOOGLE_DRIVE_LOG_FOLDER_ID=${GOOGLE_DRIVE_LOG_FOLDER_ID}
      - GOOGLE_DRIVE_LOG_SUBFOLDER=${GOOGLE_DRIVE_LOG_SUBFOLDER}
      - GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE=/app/gdrive_key.json

    depends_on:
      - db
      - redis
    networks:
      - smart-network
    restart: always
    logging: *default-logging
    deploy:
      update_config:
        order: start-first


  celery_beat:
    build: ./jwtauth
    container_name: ${PROJECT_NAME}-celery-beat
    command: celery -A jwtauth beat -l info
    volumes:
      - ./jwtauth:/app
      - ${HOST_CONFIG_PATH}/service_account.json:/app/gdrive_key.json:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
      - GOOGLE_DRIVE_LOG_FOLDER_ID=${GOOGLE_DRIVE_LOG_FOLDER_ID}
      - GOOGLE_DRIVE_LOG_SUBFOLDER=${GOOGLE_DRIVE_LOG_SUBFOLDER}
      - GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE=/app/gdrive_key.json
    depends_on:
      - db
      - redis
    networks:
      - smart-network
    logging: *default-logging
    restart: always
    deploy:
      update_config:
        order: start-first

  n8n:
    image: n8nio/n8n:latest
    container_name: ${PROJECT_NAME}-n8n
    environment:
      N8N_HOST: ${N8N_DOMAIN}
      N8N_URL: https://${N8N_DOMAIN}
      WEBHOOK_URL: https://${N8N_DOMAIN}
      N8N_TRUST_PROXY: "true"
      EXPLICIT_TRUST_PROXY: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PROTOCOL: https
      GENERIC_TIMEZONE: Asia/Dhaka
      NODE_OPTIONS: --max-old-space-size=2048
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
      - redis
      - db
    deploy:
      update_config:
        order: start-first
    restart: always 
    logging: *default-logging
    hostname: newsmartagent-n8n
    networks:
      - smart-network
  
  flower:
    image: mher/flower
    container_name: ${PROJECT_NAME}-flower
    command: celery --broker=${REDIS_URL} flower --basic_auth=${FLOWER_BASIC_AUTH}
    environment:
      - CELERY_BROKER_URL=${REDIS_URL}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH}
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - smart-network
    logging: *default-logging
    restart: always


  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ${PROJECT_NAME}-cloudflare-tunnel
    user: root
    restart: always
    deploy:
      update_config:
        order: start-first
    dns:
      - 1.1.1.1 
    networks:
      - smart-network
    volumes:
      # Allow per-environment config/credential files via env overrides.
      - ./cloudflare-config/config.yml:/etc/cloudflared/config.yml:ro
      - ${HOST_CONFIG_PATH}/${CF_CREDENTIALS_FILE:-cloudflare-config/a8cb017f-c8c7-4c04-9afe-04960ea64832.json}:/etc/cloudflared/${CF_CREDENTIALS_FILENAME:-a8cb017f-c8c7-4c04-9afe-04960ea64832.json}:ro
    command: tunnel --config /etc/cloudflared/config.yml run
    logging: *default-logging
    depends_on:
      - nginx


  baileys:
    build: ./baileys
    container_name: ${PROJECT_NAME}-baileys
    environment:
      - PORT=3001
      - N8N_WEBHOOK_URL=${N8N_WHATSAPP_WEBHOOK_URL}
      - SYNC_AGENT_URL=http://backend:8000/api/whatsapp/sync-agent/
      - BAILEYS_API_SECRET=${BAILEYS_API_SECRET}
      - BAILEYS_API_URL=http://baileys:3001
      - LOG_LEVEL=info
    volumes:
      - baileys_auth:/app/auth_info_baileys
    depends_on:
      - n8n
    restart: always
    logging: *default-logging
    deploy:
      update_config:
        order: start-first
    networks:
      - smart-network

  minio:
    image: quay.io/minio/minio:latest
    container_name: ${PROJECT_NAME}-minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=https://${MINIO_API_DOMAIN}
      - MINIO_BROWSER_REDIRECT_URL=https://${MINIO_CONSOLE_DOMAIN}
    restart: always
    logging: *default-logging
    deploy:
      update_config:
        order: start-first
    networks:
      - smart-network

volumes:
  postgres_data:
    external: true
    name: ${VOLUME_PREFIX}_pg_data
  redis_data:
    name: ${VOLUME_PREFIX}_redis_data
  static_volume:
    name: ${VOLUME_PREFIX}-static
  media_volume:
    name: ${VOLUME_PREFIX}-media
  n8n_data:
    name: ${VOLUME_PREFIX}_n8n_data
  baileys_auth:
    name: ${VOLUME_PREFIX}-baileys-auth
  minio_data:
    name: ${VOLUME_PREFIX}-minio-data
  

networks:
  smart-network:
    name: ${NETWORK_NAME}
    driver: bridge
